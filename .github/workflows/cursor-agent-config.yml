name: Cursor Agent Config

on:
  pull_request:
    paths:
      - ".cursor/**"
      - ".agents/**"
      - ".cursorrules"
      - "AGENTS.md"
      - "docs/engineering/**"
      - "scripts/sync_agent_skills.py"
      - "scripts/validate_cursor_pack.py"
      - ".github/workflows/cursor-agent-config.yml"
      - "package.json"
      - "package-lock.json"

  push:
    branches:
      - main
    paths:
      - ".cursor/**"
      - ".agents/**"
      - ".cursorrules"
      - "AGENTS.md"
      - "docs/engineering/**"
      - "scripts/sync_agent_skills.py"
      - "scripts/validate_cursor_pack.py"
      - ".github/workflows/cursor-agent-config.yml"
      - "package.json"
      - "package-lock.json"

permissions:
  contents: read

concurrency:
  group: cursor-agent-config-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    env:
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check mirrored Codex skills
        run: |
          python scripts/sync_agent_skills.py --check

      - name: Validate Cursor package
        run: |
          python scripts/validate_cursor_pack.py

      - name: Run Cursor hook tests
        run: |
          python -m unittest discover .cursor/hooks/tests

      - name: Validate Python syntax
        run: |
          python - <<'PY'
          import ast
          from pathlib import Path

          files = [
              ".cursor/hooks/guard.py",
              "scripts/validate_cursor_pack.py",
              "scripts/sync_agent_skills.py",
          ]

          for file in files:
              path = Path(file)
              ast.parse(path.read_text(encoding="utf-8"), filename=str(path))

          print(":white_check_mark: Python syntax is valid")
          PY

      - name: Validate hooks.json
        run: |
          python -m json.tool .cursor/hooks.json > /dev/null

      - name: Detect stale generated files
        run: |
          git diff --exit-code

      - name: Ensure Cursor runtime state is not committed
        run: |
          test ! -d .cursor/.state
